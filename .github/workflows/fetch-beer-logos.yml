name: Fetch beer logos

# Downloads each beer's logo via scripts/fetch-logos.mjs and commits the
# resulting files in logos/ back to the branch. Runs whenever BRAND_DOMAINS,
# the fetch script, or the URL overrides change — and on manual dispatch.
on:
  push:
    branches:
      - '**'
    paths:
      - 'script.js'
      - 'scripts/fetch-logos.mjs'
      - 'scripts/logo-overrides.json'
      - '.github/workflows/fetch-beer-logos.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download every logo, ignoring existing files'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fetch-logos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    # Skip the commit pushed by this workflow itself, to avoid feedback loops.
    if: github.event.head_commit.message == null || !contains(github.event.head_commit.message, '[skip-logo-fetch]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Push back to the same branch using the default token.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch-logos.mjs
        id: fetch
        continue-on-error: true
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node scripts/fetch-logos.mjs --force | tee /tmp/fetch.log
          else
            node scripts/fetch-logos.mjs | tee /tmp/fetch.log
          fi

      - name: Summarize result
        run: |
          echo "### fetch-logos.mjs output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 100 /tmp/fetch.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push changes
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add logos/

          if git diff --cached --quiet; then
            echo "No logo changes to commit."
            exit 0
          fi

          ADDED=$(git diff --cached --name-only --diff-filter=A | wc -l | tr -d ' ')
          MOD=$(git diff --cached --name-only --diff-filter=M | wc -l | tr -d ' ')

          git commit -m "Refresh beer logos (+${ADDED} new, ${MOD} updated) [skip-logo-fetch]"
          git push origin HEAD:${{ github.ref_name }}
